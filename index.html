<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bastians Wetterstation | Steinach bei Rothenburg</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7f6;
      margin: 0;
      padding: 30px;
      text-align: center;
    }

    .card {
      max-width: 700px;
      margin: auto;
      background: white;
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 4px 12px rgba(0,0,0,.15);
    }

    h1 {
      margin-bottom: 5px;
      color: #333;
    }

    .ort {
      color: #666;
      margin-bottom: 25px;
    }

    .temp {
      font-size: 56px;
      font-weight: bold;
      color: #ff5722;
      margin-bottom: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .info {
      background: #f7f8fa;
      border-radius: 10px;
      padding: 15px;
      font-size: 18px;
    }

    .label {
      color: #666;
      margin-bottom: 5px;
    }

    .value {
      font-weight: bold;
      color: #222;
    }

    .stand {
      margin-top: 25px;
      color: #666;
      font-size: 16px;
    }

    @media (max-width: 600px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="card">

    <h1>🌦 Bastians Wetterstation</h1>
    <div class="ort">
      📍 Steinach bei Rothenburg ob der Tauber
    </div>

    <div class="temp">
      28.0 °C
    </div>

    <div class="grid">

      <div class="info">
        <div class="label">💧 Luftfeuchtigkeit</div>
        <div class="value">
          37.0 %
        </div>
      </div>

      <div class="info">
        <div class="label">🌬 Wind</div>
        <div class="value">
          7.92 km/h
        </div>
      </div>

      <div class="info">
        <div class="label">🌪 Böen</div>
        <div class="value">
          14.4 km/h
        </div>
      </div>

      <div class="info">
        <div class="label">🧭 Windrichtung</div>
        <div class="value">
          NO
        </div>
      </div>

      <div class="info">
        <div class="label">📈 Luftdruck</div>
        <div class="value">
          973 hPa
        </div>
      </div>

      <div class="info">
        <div class="label">☀️ UV-Index</div>
        <div class="value">
          2.0
        </div>
      </div>

      <div class="info">
        <div class="label">💡 Helligkeit</div>
        <div class="value">
          34946 lx
        </div>
      </div>

      <div class="info">
        <div class="label">🌧 Regen heute</div>
        <div class="value">
          0 mm
        </div>
      </div>

    </div>

    <div class="stand">
      🕒 09.07.2026 18:45 Uhr
    </div>

  </div>
</body>
</html>
