name: Wetter-Webseite bauen

on:
  repository_dispatch:
    types:
      - wetter_update

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: HTML-Datei erstellen
        run: |
          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="de">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Bastians Wetterstation | Steinach bei Rothenburg</title>

            css/style.css
          </head>

          <body>
            <div class="card">

              <h1>🌦 Bastians Wetterstation</h1>

              <div class="ort">
                📍 Steinach bei Rothenburg ob der Tauber
              </div>

              <div class="temp">
                ${{ github.event.client_payload.temperatur }} °C
              </div>

              <div class="grid">

                <div class="info">
                  <div class="label">💧 Luftfeuchtigkeit</div>
                  <div class="value">
                    ${{ github.event.client_payload.luftfeuchtigkeit }} %
                  </div>
                </div>

                <div class="info">
                  <div class="label">🌬 Wind</div>
                  <div class="value">
                    ${{ github.event.client_payload.windgeschwindigkeit }} km/h
                  </div>
                </div>

                <div class="info">
                  <div class="label">🌪 Böen</div>
                  <div class="value">
                    ${{ github.event.client_payload.boengeschwindigkeit }} km/h
                  </div>
                </div>

                <div class="info">
                  <div class="label">🧭 Windrichtung</div>
                  <div class="value">
                    ${{ github.event.client_payload.windrichtung }}
                  </div>
                </div>

                <div class="info">
                  <div class="label">📈 Luftdruck</div>
                  <div class="value">
                    ${{ github.event.client_payload.druck }} hPa
                  </div>
                </div>

                <div class="info">
                  <div class="label">☀️ UV-Index</div>
                  <div class="value">
                    ${{ github.event.client_payload.uv_index }}
                  </div>
                </div>

                <div class="info">
                  <div class="label">💡 Helligkeit</div>
                  <div class="value">
                    ${{ github.event.client_payload.beleuchtungsstarke }} lx
                  </div>
                </div>

                <div class="info">
                  <div class="label">🌧 Regen heute</div>
                  <div class="value">
                    ${{ github.event.client_payload.regen_heute }} mm
                  </div>
                </div>

              </div>

              <div class="projekte">
                <h2>🚀 Weitere Projekte</h2>

                projekte/Wetterstation.html="projekt-link">
                  🌦 Wetterstation
                </a>
              </div>

              <div class="stand">
                🕒 ${{ github.event.client_payload.zeit }}
              </div>

            </div>
          </body>
          </html>
          EOF

      - name: Commit und Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Wetter-Update von HAOS"
          file_pattern: index.html
